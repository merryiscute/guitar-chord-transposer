<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기타 코드 진행 키 변환기</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d1a;
    --surface: #161628;
    --surface2: #1e1e35;
    --border: #2a2a45;
    --accent: #f0c040;
    --accent2: #4da6ff;
    --green: #4dcc88;
    --red: #ff5f5f;
    --text: #e0e0f0;
    --muted: #7070a0;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 1.7rem; color: var(--accent); letter-spacing: 1px; }
  .header p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }

  /* ── Input Panel ── */
  .input-panel {
    max-width: 780px; margin: 0 auto 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 22px;
  }
  .input-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 200px; }
  .field label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  input[type=text], select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 13px; border-radius: 8px;
    font-size: 0.95rem; outline: none; transition: border-color .2s;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  select { cursor: pointer; }

  .btn {
    background: var(--accent); color: #0d0d1a; border: none;
    padding: 10px 22px; border-radius: 8px; font-size: 0.95rem;
    font-weight: 700; cursor: pointer; transition: .15s; height: 42px; white-space: nowrap;
  }
  .btn:hover { background: #ffd060; transform: translateY(-1px); }
  .btn:active { transform: none; }

  .quick-row { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .ql { font-size: 0.75rem; color: var(--muted); margin-right: 4px; }
  .chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: #a0a0cc; padding: 4px 11px; border-radius: 20px; font-size: 0.78rem;
    cursor: pointer; transition: .15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Loading ── */
  #loadingBar {
    text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem;
    display: none;
  }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results ── */
  #results { max-width: 960px; margin: 0 auto; }

  .prog-header {
    text-align: center; margin-bottom: 18px; font-size: 0.9rem; color: var(--muted);
  }
  .prog-header strong { color: var(--accent); font-size: 1.15rem; }

  /* Transposition Table */
  .trans-table-wrap { overflow-x: auto; margin-bottom: 28px; }
  table.trans-table {
    width: 100%; border-collapse: collapse; font-size: 0.88rem;
  }
  table.trans-table th {
    background: var(--surface2); color: var(--muted); text-align: center;
    padding: 9px 10px; border-bottom: 2px solid var(--border);
    font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .4px;
    white-space: nowrap;
  }
  table.trans-table td {
    text-align: center; padding: 8px 8px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .12s; white-space: nowrap;
  }
  table.trans-table tr:hover td { background: var(--surface2); }
  table.trans-table tr.active td { background: #1e1c30; }
  .key-cell {
    font-weight: 700; font-size: 0.92rem; min-width: 64px;
    color: var(--text);
  }
  .key-cell .semi { font-size: 0.68rem; color: var(--muted); display: block; }
  .chord-cell { font-size: 0.95rem; min-width: 72px; }
  .chord-cell .root { color: var(--text); font-weight: 600; }
  .chord-cell .suf { color: var(--muted); font-size: 0.82rem; }
  .chord-cell.no-data .root { color: #554444; }
  tr.original-row td { background: #1a1828 !important; }
  tr.original-row .key-cell { color: var(--accent); }
  .orig-badge {
    display: inline-block; background: var(--accent); color: #0d0d1a;
    border-radius: 3px; font-size: 0.6rem; padding: 1px 5px; font-weight: 700;
    vertical-align: middle; margin-left: 4px; letter-spacing: .3px;
  }
  .expand-icon { color: var(--muted); font-size: 0.7rem; margin-left: 4px; }

  /* Diagram Panel */
  .diagram-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 28px;
    display: none;
  }
  .diagram-panel.open { display: block; }
  .diagram-panel-header {
    text-align: center; margin-bottom: 16px;
    font-size: 0.85rem; color: var(--muted);
  }
  .diagram-panel-header strong { color: var(--accent2); font-size: 1.1rem; }
  .diagrams-row {
    display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;
  }

  /* Chord Card */
  .chord-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 12px 10px;
    text-align: center; min-width: 130px;
    transition: border-color .2s;
  }
  .chord-card:hover { border-color: var(--accent2); }
  .card-name { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 10px; }
  .card-name .suf { font-size: 0.8rem; color: var(--muted); font-weight: 400; }
  .card-pos-label { font-size: 0.65rem; color: var(--muted); margin-top: 6px; }
  svg.cd { display: block; margin: 0 auto; }
  .no-voicing { color: #554455; font-size: 0.78rem; padding: 20px 0; }

  /* Position switcher */
  .pos-switch { display: flex; gap: 4px; justify-content: center; margin-top: 6px; }
  .pos-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border); cursor: pointer; transition: background .15s;
  }
  .pos-dot.active { background: var(--accent2); }

  /* Error */
  .err { text-align: center; color: var(--red); padding: 16px; font-size: 0.9rem; }

  @media (max-width: 600px) {
    table.trans-table { font-size: 0.78rem; }
    .chord-card { min-width: 110px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎸 코드 진행 키 변환기</h1>
  <p>코드 진행을 입력하면 모든 키로 옮겼을 때 코드와 운지를 보여드려요</p>
</div>

<div class="input-panel">
  <div class="input-row">
    <div class="field" style="flex:2">
      <label>코드 진행 입력</label>
      <input type="text" id="progInput" placeholder="예: C Am F G  /  G/B C/E Am/C  /  Cmaj7 Am7 Fmaj7 G7" value="C Am F G" />
    </div>
    <div class="field" style="flex:0;min-width:130px">
      <label>원본 키</label>
      <select id="origKey">
        <option value="auto">자동 감지</option>
        <option value="C">C</option><option value="C#">C# / Db</option>
        <option value="D">D</option><option value="Eb">Eb / D#</option>
        <option value="E">E</option><option value="F">F</option>
        <option value="F#">F# / Gb</option><option value="G">G</option>
        <option value="Ab">Ab / G#</option><option value="A">A</option>
        <option value="Bb">Bb / A#</option><option value="B">B</option>
      </select>
    </div>
    <button class="btn" onclick="run()">변환</button>
  </div>
  <div class="quick-row">
    <span class="ql">예시:</span>
    <span class="chip" onclick="setAndRun('C Am F G')">C Am F G</span>
    <span class="chip" onclick="setAndRun('G Em C D')">G Em C D</span>
    <span class="chip" onclick="setAndRun('A F#m D E')">A F#m D E</span>
    <span class="chip" onclick="setAndRun('Dm Am Bb C')">Dm Am Bb C</span>
    <span class="chip" onclick="setAndRun('Cmaj7 Am7 Fmaj7 G7')">Cmaj7 Am7 Fmaj7 G7</span>
    <span class="chip" onclick="setAndRun('E B C#m A')">E B C#m A</span>
    <span class="chip" onclick="setAndRun('Am G F E7')">Am G F E7</span>
    <span class="chip" onclick="setAndRun('C G/B Am F')">C G/B Am F</span>
    <span class="chip" onclick="setAndRun('C/E F G Am')">C/E F G Am</span>
    <span class="chip" onclick="setAndRun('D A/C# Bm G')">D A/C# Bm G</span>
  </div>
</div>

<div id="loadingBar"><span class="spinner"></span>코드 데이터베이스 로딩 중...</div>
<div id="results"></div>

<script>
// ════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════
const DB_URL = 'https://raw.githubusercontent.com/tombatossals/chords-db/master/lib/guitar.json';

const DB_KEYS = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

const ROOT_NORM = {
  'C':'C','C#':'C#','Db':'C#','D':'D','D#':'Eb','Eb':'Eb',
  'E':'E','F':'F','F#':'F#','Gb':'F#','G':'G','G#':'Ab','Ab':'Ab',
  'A':'A','A#':'Bb','Bb':'Bb','B':'B','Cb':'B','B#':'C','E#':'F','Fb':'E'
};

const KEY_DISPLAY = {
  'C':'C','C#':'C#/Db','D':'D','Eb':'Eb/D#','E':'E','F':'F',
  'F#':'F#/Gb','G':'G','Ab':'Ab/G#','A':'A','Bb':'Bb/A#','B':'B'
};

const SUFFIX_MAP = {
  '': 'major', 'maj': 'major', 'major': 'major', 'M': 'major',
  'm': 'minor', 'min': 'minor', 'minor': 'minor',
  '7': '7', 'dom7': '7',
  'maj7': 'maj7', 'M7': 'maj7', 'Δ': 'maj7', 'Δ7': 'maj7',
  'm7': 'm7', 'min7': 'm7', '-7': 'm7',
  'dim': 'dim', 'o': 'dim', '°': 'dim',
  'dim7': 'dim7', 'o7': 'dim7',
  'aug': 'aug', '+': 'aug',
  'sus2': 'sus2', 'sus4': 'sus4', 'sus': 'sus4',
  '5': '5', 'power': '5',
  '6': '6', 'm6': 'm6',
  '9': '9', 'maj9': 'maj9', 'm9': 'm9', 'add9': 'add9',
  '11': '11', '13': '13',
  'm7b5': 'm7b5', 'ø': 'm7b5', 'ø7': 'm7b5',
  'mmaj7': 'mmaj7', '7sus4': '7sus4',
};

const SUFFIX_DISPLAY = {
  'major':'', 'minor':'m', '7':'7', 'maj7':'maj7', 'm7':'m7',
  'dim':'dim', 'dim7':'dim7', 'aug':'aug', 'sus2':'sus2', 'sus4':'sus4',
  '5':'5', '6':'6', 'm6':'m6', '9':'9', 'maj9':'maj9', 'm9':'m9',
  'add9':'add9', '11':'11', '13':'13', 'm7b5':'m7b5', 'mmaj7':'mmaj7', '7sus4':'7sus4'
};

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let DB = null;
let openRowIdx = -1;

// ════════════════════════════════════════════════════════
//  DB LOADING
// ════════════════════════════════════════════════════════
async function loadDB() {
  if (DB) return true;
  document.getElementById('loadingBar').style.display = 'block';
  try {
    const res = await fetch(DB_URL);
    const json = await res.json();
    DB = {};
    for (const [k, arr] of Object.entries(json.chords)) {
      DB[k] = {};
      for (const chord of arr) {
        DB[k][chord.suffix] = chord.positions;
      }
    }
    document.getElementById('loadingBar').style.display = 'none';
    return true;
  } catch(e) {
    document.getElementById('loadingBar').innerHTML =
      `<span style="color:#ff5f5f">❌ 데이터 로드 실패: ${e.message}</span>`;
    return false;
  }
}

// ════════════════════════════════════════════════════════
//  CHORD PARSING  (분수코드 지원)
// ════════════════════════════════════════════════════════
function parseBassNote(str) {
  str = str.trim();
  if (!str) return null;
  let bassRoot = str[0].toUpperCase();
  if (str.length > 1 && (str[1] === '#' || str[1] === 'b')) bassRoot += str[1];
  return ROOT_NORM[bassRoot] ?? null;
}

function parseChord(token) {
  token = token.trim();
  if (!token) return null;

  // ── 분수코드 감지: 마지막 '/' 기준으로 베이스음 분리 ──
  let bass = null;
  const slashIdx = token.indexOf('/');
  if (slashIdx > 0) {
    const normBass = parseBassNote(token.slice(slashIdx + 1));
    if (normBass) {
      bass = normBass;
      token = token.slice(0, slashIdx).trim();
    }
  }

  // ── 루트음 파싱 ──
  let root = token[0].toUpperCase();
  let rest = token.slice(1);
  if (rest.length > 0 && (rest[0] === '#' || rest[0] === 'b')) {
    root += rest[0];
    rest = rest.slice(1);
  }
  const normRoot = ROOT_NORM[root];
  if (!normRoot) return null;

  // ── 서픽스 파싱 ──
  let normSuffix = SUFFIX_MAP[rest] ?? SUFFIX_MAP[rest.toLowerCase()] ?? null;
  if (normSuffix === null) {
    if (/^maj7/i.test(rest)) normSuffix = 'maj7';
    else if (/^m7/i.test(rest)) normSuffix = 'm7';
    else if (/^m/i.test(rest)) normSuffix = 'minor';
    else normSuffix = 'major';
  }

  return { root: normRoot, suffix: normSuffix, bass };
}

function parseProgression(text) {
  const tokens = text.split(/[\s,|]+/).filter(t => t && t !== '-');
  const chords = [];
  for (const t of tokens) {
    const c = parseChord(t);
    if (c) chords.push({ ...c, original: t });
  }
  return chords;
}

// ════════════════════════════════════════════════════════
//  TRANSPOSITION
// ════════════════════════════════════════════════════════
function transposeRoot(root, semitones) {
  const idx = DB_KEYS.indexOf(root);
  return DB_KEYS[(idx + semitones + 12) % 12];
}

// DB에서 분수코드 서픽스 구성
// DB에는 major slash → "/E", minor slash → "m/E" 형태로 저장됨
function buildSlashSuffix(suffix, bass) {
  if (suffix === 'major') return `/${bass}`;
  if (suffix === 'minor') return `m/${bass}`;
  return null;
}

// 분수코드 포지션 우선, 없으면 일반 코드 포지션 반환
function getPositions(root, suffix, bass) {
  if (bass) {
    const slashSuffix = buildSlashSuffix(suffix, bass);
    if (slashSuffix && DB?.[root]?.[slashSuffix]) {
      return { positions: DB[root][slashSuffix], isSlash: true };
    }
    // 분수코드 데이터 없으면 일반 코드로 폴백
    const plain = DB?.[root]?.[suffix];
    return plain ? { positions: plain, isSlash: false, fallback: true } : null;
  }
  const plain = DB?.[root]?.[suffix];
  return plain ? { positions: plain, isSlash: false } : null;
}

// 표시용 코드명 (분수코드 포함)
function chordDispName(root, suffix, bass) {
  const s = SUFFIX_DISPLAY[suffix] ?? suffix;
  return bass ? `${root}${s}/${bass}` : `${root}${s}`;
}

// card element ID (특수문자 제거)
function safeId(rowIdx, root, suffix, bass) {
  const clean = (s) => s.replace(/[^a-zA-Z0-9]/g, '_');
  return `card-${rowIdx}-${clean(root)}-${clean(suffix)}${bass ? '-' + clean(bass) : ''}`;
}

// ════════════════════════════════════════════════════════
//  SVG CHORD DIAGRAM
// ════════════════════════════════════════════════════════
function renderDiagram(pos, rootNote, bassNote, size = 1) {
  if (!pos) return `<div class="no-voicing">운지 없음</div>`;
  const { frets, fingers, baseFret, barres } = pos;

  const W = Math.round(130 * size), H = Math.round(150 * size);
  const LP = Math.round(20 * size), RP = Math.round(8 * size);
  const TP = Math.round(30 * size), BP = Math.round(14 * size);
  const gW = W - LP - RP, gH = H - TP - BP;
  const nStr = 6, nFrets = 5;
  const sS = gW / (nStr - 1);
  const fS = gH / nFrets;
  const dotR = Math.round(7 * size);
  const fs = Math.round(9 * size);

  let svg = `<svg class="cd" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;

  // 너트 or 프렛 번호
  if (baseFret === 1) {
    svg += `<rect x="${LP}" y="${TP - Math.round(4*size)}" width="${gW}" height="${Math.round(4*size)}" rx="${Math.round(2*size)}" fill="#b8a050"/>`;
  } else {
    svg += `<text x="${LP - Math.round(3*size)}" y="${TP + fS*0.65}" font-size="${fs}" fill="#888" text-anchor="end" font-family="monospace">${baseFret}fr</text>`;
  }

  // 프렛선
  for (let f = 0; f <= nFrets; f++) {
    const y = TP + f * fS;
    svg += `<line x1="${LP}" y1="${y}" x2="${LP+gW}" y2="${y}" stroke="#333" stroke-width="${f===0?0:0.7}"/>`;
  }
  // 줄선
  for (let s = 0; s < nStr; s++) {
    const x = LP + s * sS;
    svg += `<line x1="${x}" y1="${TP}" x2="${x}" y2="${TP+gH}" stroke="#444" stroke-width="0.8"/>`;
  }

  // 바레
  if (barres && barres.length > 0) {
    for (const bf of barres) {
      const indices = frets.map((f,i) => f === bf ? i : -1).filter(i => i >= 0);
      if (indices.length >= 2) {
        const bY = TP + (bf - 0.5) * fS;
        const bX1 = LP + indices[0] * sS;
        const bX2 = LP + indices[indices.length-1] * sS;
        svg += `<rect x="${bX1}" y="${bY-dotR*0.9}" width="${bX2-bX1}" height="${dotR*1.8}" rx="${dotR}" fill="#d08820" opacity="0.9"/>`;
      }
    }
  }

  // 줄별 마커
  for (let s = 0; s < nStr; s++) {
    const x = LP + s * sS;
    const fret = frets[s];

    if (fret === -1) {
      svg += `<text x="${x}" y="${TP - Math.round(9*size)}" font-size="${Math.round(11*size)}" fill="#cc4444" text-anchor="middle" font-weight="bold">✕</text>`;
    } else if (fret === 0) {
      const cy = TP - Math.round(9*size);
      const isB = bassNote && checkNoteMatch(s, 0, baseFret, bassNote);
      svg += `<circle cx="${x}" cy="${cy}" r="${Math.round(5*size)}" fill="${isB?'#a0d8a0':'none'}" stroke="${isB?'#50c878':'#50c878'}" stroke-width="${Math.round(1.5*size)}"/>`;
    } else {
      const cy = TP + (fret - 0.5) * fS;
      const isRoot = checkNoteMatch(s, fret, baseFret, rootNote);
      const isBass = bassNote && checkNoteMatch(s, fret, baseFret, bassNote);
      const isBarred = barres && barres.includes(fret);
      if (!isBarred) {
        // 루트: 노란색, 베이스: 초록색, 일반: 파란색
        const fill = isBass ? '#50c878' : (isRoot ? '#f0c040' : '#4488dd');
        svg += `<circle cx="${x}" cy="${cy}" r="${dotR}" fill="${fill}"/>`;
      }
      const finger = fingers?.[s];
      if (finger && finger > 0) {
        svg += `<text x="${x}" y="${cy+Math.round(3.5*size)}" font-size="${Math.round(8*size)}" fill="#fff" text-anchor="middle" font-weight="bold">${finger}</text>`;
      }
    }
  }

  svg += `</svg>`;
  return svg;
}

function checkNoteMatch(stringIdx, fret, baseFret, noteName) {
  const openPitch = [4, 9, 2, 7, 11, 4]; // E A D G B e
  const actual = fret === 0 ? 0 : (baseFret + fret - 1);
  const pitch = (openPitch[stringIdx] + actual) % 12;
  return pitch === DB_KEYS.indexOf(noteName);
}

// ════════════════════════════════════════════════════════
//  MAIN RENDER
// ════════════════════════════════════════════════════════
async function run() {
  const ok = await loadDB();
  if (!ok) return;

  const text = document.getElementById('progInput').value.trim();
  if (!text) return;

  const chords = parseProgression(text);
  if (chords.length === 0) {
    document.getElementById('results').innerHTML = `<div class="err">코드를 인식할 수 없어요. 예: C Am F G  또는  C/E Am G/B F</div>`;
    return;
  }

  openRowIdx = -1;

  const origKeyInput = document.getElementById('origKey').value;
  let origIdx = 0;
  if (origKeyInput !== 'auto') {
    const origKey = ROOT_NORM[origKeyInput] || origKeyInput;
    const firstIdx = DB_KEYS.indexOf(chords[0].root);
    origIdx = ((DB_KEYS.indexOf(origKey) - firstIdx) + 12) % 12;
  }

  // 12개 전조 행 생성
  const rows = [];
  for (let semi = 0; semi < 12; semi++) {
    rows.push({
      semi,
      chords: chords.map(c => ({
        root: transposeRoot(c.root, semi),
        suffix: c.suffix,
        bass: c.bass ? transposeRoot(c.bass, semi) : null,
      }))
    });
  }

  let html = `
    <div class="prog-header">
      원본 진행: <strong>${chords.map(c => chordDispName(c.root, c.suffix, c.bass)).join('  –  ')}</strong>
      <span style="color:var(--muted);font-size:0.8rem"> (행을 클릭하면 운지 확인)</span>
    </div>
    <div class="trans-table-wrap">
    <table class="trans-table" id="transTable">
    <thead><tr>
      <th>키</th>
      ${chords.map(c => `<th>${c.original}</th>`).join('')}
      <th></th>
    </tr></thead>
    <tbody>
  `;

  for (let i = 0; i < 12; i++) {
    const row = rows[i];
    const isOrig = (i === origIdx);
    const keyName = row.chords[0].root;
    const semiLabel = row.semi === 0 ? '원본' : (row.semi <= 6 ? `+${row.semi}` : `-${12-row.semi}`);

    html += `<tr class="${isOrig?'original-row':''}" onclick="toggleDiagram(${i})" id="row-${i}">`;
    html += `<td class="key-cell">${KEY_DISPLAY[keyName]||keyName}${isOrig?'<span class="orig-badge">원본</span>':''}<span class="semi">${semiLabel} 반음</span></td>`;

    for (const chord of row.chords) {
      const result = getPositions(chord.root, chord.suffix, chord.bass);
      const hasData = !!result;
      const dispSuf = SUFFIX_DISPLAY[chord.suffix] ?? chord.suffix;
      const slashPart = chord.bass ? `<span style="color:var(--green);font-size:0.78rem">/${chord.bass}</span>` : '';
      html += `<td class="chord-cell${hasData?'':' no-data'}">
        <span class="root">${chord.root}</span><span class="suf">${dispSuf}</span>${slashPart}
        ${result && result.fallback ? '<span style="font-size:0.6rem;color:#a06040;display:block">운지 근사</span>' : ''}
      </td>`;
    }
    html += `<td style="width:20px"><span class="expand-icon" id="icon-${i}">▶</span></td>`;
    html += `</tr>`;
    html += `<tr id="diag-row-${i}" style="display:none"><td colspan="${chords.length+2}" style="padding:0">
      <div class="diagram-panel open" id="diag-${i}"></div>
    </td></tr>`;
  }

  html += `</tbody></table></div>`;
  document.getElementById('results').innerHTML = html;
}

function toggleDiagram(rowIdx) {
  const prev = openRowIdx;
  if (prev >= 0 && prev !== rowIdx) {
    document.getElementById(`diag-row-${prev}`).style.display = 'none';
    document.getElementById(`icon-${prev}`).textContent = '▶';
    document.getElementById(`row-${prev}`)?.classList.remove('active');
  }
  if (prev === rowIdx) {
    document.getElementById(`diag-row-${rowIdx}`).style.display = 'none';
    document.getElementById(`icon-${rowIdx}`).textContent = '▶';
    document.getElementById(`row-${rowIdx}`)?.classList.remove('active');
    openRowIdx = -1;
    return;
  }

  openRowIdx = rowIdx;
  document.getElementById(`icon-${rowIdx}`).textContent = '▼';
  document.getElementById(`row-${rowIdx}`)?.classList.add('active');

  const text = document.getElementById('progInput').value.trim();
  const chords = parseProgression(text);
  const panel = document.getElementById(`diag-${rowIdx}`);

  const transposed = chords.map(c => ({
    root: transposeRoot(c.root, rowIdx),
    suffix: c.suffix,
    bass: c.bass ? transposeRoot(c.bass, rowIdx) : null,
  }));

  const keyName = transposed[0].root;
  let inner = `
    <div class="diagram-panel-header">
      <strong>Key of ${KEY_DISPLAY[keyName]||keyName}</strong>
      — ${transposed.map(c => chordDispName(c.root, c.suffix, c.bass)).join('  –  ')}
    </div>
    <div class="diagrams-row">
  `;

  for (const chord of transposed) {
    const result = getPositions(chord.root, chord.suffix, chord.bass);
    const dispSuf = SUFFIX_DISPLAY[chord.suffix] ?? chord.suffix;
    const dispName = chordDispName(chord.root, chord.suffix, chord.bass);
    const cardId = safeId(rowIdx, chord.root, chord.suffix, chord.bass);
    const bassEnc = chord.bass ? encodeURIComponent(chord.bass) : '';

    inner += `<div class="chord-card" id="${cardId}">`;
    // 코드명 표시 (분수코드는 베이스음 강조)
    if (chord.bass) {
      inner += `<div class="card-name">${chord.root}<span class="suf">${dispSuf}</span><span style="color:var(--green);font-size:0.85rem">/${chord.bass}</span></div>`;
    } else {
      inner += `<div class="card-name">${chord.root}<span class="suf">${dispSuf}</span></div>`;
    }

    if (!result) {
      inner += `<div class="no-voicing">데이터 없음</div>`;
    } else {
      const { positions, isSlash, fallback } = result;
      if (fallback) {
        inner += `<div style="font-size:0.65rem;color:#a06040;margin-bottom:4px">※ 분수코드 운지 없음 (근사)</div>`;
      }
      inner += renderDiagram(positions[0], chord.root, chord.bass);
      if (positions.length > 1) {
        inner += `<div class="pos-switch">`;
        for (let p = 0; p < Math.min(positions.length, 6); p++) {
          inner += `<div class="pos-dot${p===0?' active':''}"
            onclick="switchPos(event,'${cardId}','${chord.root}','${chord.suffix}','${bassEnc}',${p})"
            data-pos="${p}"></div>`;
        }
        inner += `</div>`;
        inner += `<div class="card-pos-label">포지션 ${positions.length}개</div>`;
      }
    }
    inner += `</div>`;
  }

  inner += `</div>`;
  panel.innerHTML = inner;
  document.getElementById(`diag-row-${rowIdx}`).style.display = 'table-row';
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

function switchPos(e, cardId, root, suffix, bassEnc, posIdx) {
  e.stopPropagation();
  const bass = bassEnc ? decodeURIComponent(bassEnc) : null;
  const result = getPositions(root, suffix, bass);
  if (!result || posIdx >= result.positions.length) return;

  const card = document.getElementById(cardId);
  if (!card) return;

  const old = card.querySelector('svg.cd');
  if (old) old.outerHTML = renderDiagram(result.positions[posIdx], root, bass);

  card.querySelectorAll('.pos-dot').forEach((d, i) => d.classList.toggle('active', i === posIdx));
}

function setAndRun(prog) {
  document.getElementById('progInput').value = prog;
  document.getElementById('origKey').value = 'auto';
  run();
}

document.getElementById('progInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') run();
});

loadDB();
</script>
</body>
</html>
